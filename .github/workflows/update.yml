name: 灵鹿直播源自动更新

# 👉 必须添加：给 Actions Bot 写入仓库的权限，否则推送会失败
permissions:
  contents: write

# 触发：6小时定时 + 手动可点运行
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-spider:
    runs-on: ubuntu-latest
    # 全局设置时区为北京时间
    env:
      TZ: Asia/Shanghai
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行采集整理脚本
        run: python main.py

      - name: 提交更新文件回仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 先拉取远程最新代码，解决冲突（用rebase避免合并提交）
          git pull --rebase origin main || true
          git add live.txt result.txt
          git commit -m "自动更新直播源 定时6h任务" || echo "无变更无需提交"
          # 强制推送，彻底解决 rejected 问题，保证更新100%生效
          git push -f origin main

