name: Auto Update
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python main.py

      - name: Push
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update result.txt"
          add: "result.txt"

