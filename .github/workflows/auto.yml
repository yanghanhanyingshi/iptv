name: 自动更新直播源
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5  # 升级到v5，适配Node.js 22
      - name: 配置Python
        uses: actions/setup-python@v6  # 升级到v6，适配Node.js 22
        with:
          python-version: "3.10"
          cache: "pip"
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 执行采集
        run: python main.py
      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新直播源 $(date +'%Y-%m-%d %H:%M')"
          git push -f origin main
