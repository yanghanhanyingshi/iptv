name: 自动更新直播源
on:
  schedule:
    - cron: "0 */3 * * *"  # 每3小时
  workflow_dispatch:      # 手动运行

# 👇 加上这一段（关键）
permissions:
  contents: write  # 明确给仓库写入权限
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行采集
        run: python main.py

      - name: 提交更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.txt
          git diff --quiet || git commit -m "自动更新有效直播源 $(date +'%Y-%m-%d %H:%M')"
          git push
