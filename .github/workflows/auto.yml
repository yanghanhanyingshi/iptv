name: 自动更新直播源
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

# 明确给足写入权限（兜底）
permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # 保留凭证，确保能push

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: 升级pip并安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行采集脚本
        run: python main.py

      - name: 提交并推送更新
        run: |
          # 配置git用户
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 强制添加live.txt（即使是空文件）
          git add live.txt
          
          # 检查是否有变更，有则提交，无则跳过（避免报错）
          git diff --quiet && git diff --staged --quiet || git commit -m "自动更新直播源 $(date +'%Y-%m-%d %H:%M')"
          
          # 强制推送（兜底）
          git push --force-with-lease origin main
