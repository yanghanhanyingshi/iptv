name: 自动更新直播源（央视+卫视）
on:
  # 每3小时自动运行一次
  schedule:
    - cron: '0 */3 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  update-live-source:
    # 使用轻量Ubuntu环境
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      # 步骤2：设置Python环境（3.10稳定版）
      - name: 配置Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # 步骤3：安装依赖（仅requests）
      - name: 安装依赖包
        run: pip install requests

      # 步骤4：运行脚本生成直播源
      - name: 执行更新脚本
        run: python main.py

      # 步骤5：提交并推送更新
      - name: 提交更新到仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 只提交live.txt的变更
          git add live.txt
          # 只有变更时才提交，避免空提交
          git commit -m "自动更新直播源 $(date '+%Y-%m-%d %H:%M:%S')" || echo "无更新，跳过提交"
          git push
