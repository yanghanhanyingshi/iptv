name: 自动更新直播源
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v5

      - name: 设置Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本生成源
        run: python main.py

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add live.txt
          git commit -m "自动更新直播源 $(date '+%Y-%m-%d %H:%M:%S')"
          git push
